name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish API artifact
        run: dotnet publish src/DnsGoBetween.Api/DnsGoBetween.Api.csproj -c Release -o out/api

      - name: Package artifact
        run: |
          cd out
          tar -czf dns-go-between-api-${{ github.ref_name }}.tar.gz api

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: out/dns-go-between-api-${{ github.ref_name }}.tar.gz
