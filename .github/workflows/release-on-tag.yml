name: Release On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.1)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            "RELEASE_TAG=$env:GITHUB_REF_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $version = $env:GITHUB_REF_NAME
          }
          else {
            "RELEASE_TAG=${{ inputs.tag }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $version = "${{ inputs.tag }}"
          }

          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Mark as pre-release when:
          #   - workflow_dispatch was invoked with prerelease=true, OR
          #   - the tag is a semver pre-release (contains "-", e.g. v1.3.9-beta.1, v1.3.9-rc.1).
          $dispatchPrerelease = "${{ inputs.prerelease }}" -eq "true"
          $tagIsPrerelease = $env:GITHUB_REF_NAME -match "-"
          $isPrerelease = $dispatchPrerelease -or $tagIsPrerelease
          "RELEASE_IS_PRERELEASE=$($isPrerelease.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build installer MSI
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version $env:RELEASE_VERSION -Configuration Release

      - name: Resolve MSI artifact path
        shell: pwsh
        run: |
          $msiPath = Join-Path $pwd "dist/DnsGoBetween-$env:RELEASE_VERSION.msi"
          if (-not (Test-Path $msiPath)) {
            $candidate = Get-ChildItem -Path (Join-Path $pwd "dist") -Filter *.msi -File |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1

            if ($null -eq $candidate) {
              throw "MSI not found in dist/."
            }

            $msiPath = $candidate.FullName
          }

          "MSI_PATH=$msiPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ env.RELEASE_IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: ${{ env.MSI_PATH }}
